# Lint config (used by CI). Real-bug rules — pyflakes (F) + pycodestyle errors
# (E4 imports, E7 statements, E9 syntax) — across the whole repo. Intentionally not
# style-pedantic (no line-length/UP/B enforcement) because bridges/s2s_bridge and the
# firmware components are derived from upstream code we don't restyle.
line-length = 120
target-version = "py311"

[lint]
select = ["E4", "E7", "E9", "F"]
